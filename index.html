<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Zoro Chat</title>

<style>

body{
margin:0;
font-family:Arial;
background:#2b2d31;
color:white;
}

#login{
display:flex;
flex-direction:column;
width:260px;
margin:120px auto;
gap:10px;
}

input,button{
padding:10px;
border-radius:6px;
border:none;
}

button{
background:#5865f2;
color:white;
cursor:pointer;
}

#error{
color:#ff6b6b;
font-size:14px;
min-height:18px;
}

#chat{
display:none;
height:100vh;
}

#sidebar{
width:200px;
background:#1e1f22;
padding:10px;
overflow:auto;
}

.user{
display:flex;
align-items:center;
gap:6px;
margin:5px 0;
}

.avatar{
width:24px;
height:24px;
border-radius:50%;
object-fit:cover;
}

#main{
flex:1;
display:flex;
flex-direction:column;
}

#newMsgAlert{
display:none;
background:#ff3b3b;
text-align:center;
padding:4px;
font-size:14px;
}

#messages{
flex:1;
overflow:auto;
padding:10px;
}

.message{
background:#383a40;
padding:8px;
margin:5px;
border-radius:5px;
position:relative;
display:flex;
align-items:center;
gap:6px;
}

.message:hover .delete,
.message:hover .edit{
display:block;
}

.delete{
position:absolute;
right:5px;
top:5px;
cursor:pointer;
display:none;
color:red;
}

.edit{
position:absolute;
right:25px;
top:5px;
cursor:pointer;
display:none;
}

#sendBox{
display:flex;
gap:5px;
padding:10px;
background:#1e1f22;
align-items:center;
}

#messageInput{
flex:1;
}

#emojiPicker{
position:absolute;
bottom:60px;
background:#1e1f22;
padding:10px;
border-radius:6px;
display:none;
max-width:200px;
}

.emoji{
cursor:pointer;
font-size:20px;
padding:4px;
}

</style>
</head>

<body>

<div id="login">

<h2>Zoro Chat</h2>

<input id="username" placeholder="kullanıcı adı">
<input id="password" type="password" placeholder="şifre">

<label>Profil resmi</label>
<input type="file" id="avatarInput">

<div id="error"></div>

<button onclick="register()">Kayıt Ol</button>
<button onclick="login()">Giriş Yap</button>

</div>

<div id="chat">

<div id="sidebar">

<h3>Online</h3>
<div id="onlineUsers"></div>

</div>

<div id="main">

<div id="newMsgAlert">Yeni mesaj</div>

<div id="messages"></div>

<div id="sendBox">

<button onclick="toggleEmoji()">😀</button>

<input id="messageInput" placeholder="mesaj yaz">

<button onclick="sendMessage()">Gönder</button>

</div>

<div id="emojiPicker"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
query,
where,
onSnapshot,
deleteDoc,
doc,
updateDoc,
setDoc
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyD5KePIcdesXC8UQGBbqNGU7djehgXiZ6w",
authDomain: "zoro-69e06.firebaseapp.com",
projectId: "zoro-69e06",
storageBucket: "zoro-69e06.firebasestorage.app",
messagingSenderId: "184713014140",
appId: "1:184713014140:web:0b414e4accc0fc09aa12f9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore();

const loginDiv = document.getElementById("login")
const chatDiv = document.getElementById("chat")
const errorDiv = document.getElementById("error")
const emojiPicker = document.getElementById("emojiPicker")

let currentUser=null
let currentAvatar=""
let lastCount=0

const emojis=["😀","😂","😍","😎","😭","😡","👍","👎","🔥","❤️","🎉"]

emojis.forEach(e=>{
let span=document.createElement("span")
span.className="emoji"
span.innerText=e
span.onclick=()=>messageInput.value+=e
emojiPicker.appendChild(span)
})

window.toggleEmoji=function(){
emojiPicker.style.display=
emojiPicker.style.display==="none"?"block":"none"
}

window.register=async function(){

let user=username.value.trim()
let pass=password.value.trim()

errorDiv.innerText=""

if(!user){
errorDiv.innerText="Kullanıcı adı boş bırakılamaz"
return
}

if(!pass){
errorDiv.innerText="Şifre boş bırakılamaz"
return
}

const q=query(collection(db,"users"),where("username","==",user))
const snap=await getDocs(q)

if(!snap.empty){
errorDiv.innerText="Bu kullanıcı adı zaten kullanılıyor"
return
}

let avatar=""

if(avatarInput.files[0]){
avatar=await fileToBase64(avatarInput.files[0])
}

await addDoc(collection(db,"users"),{
username:user,
password:pass,
avatar:avatar
})

errorDiv.innerText="Kayıt başarılı"

}

window.login=async function(){

let user=username.value.trim()
let pass=password.value.trim()

errorDiv.innerText=""

const q=query(collection(db,"users"),where("username","==",user))
const snap=await getDocs(q)

if(snap.empty){
errorDiv.innerText="Kullanıcı bulunamadı"
return
}

let data=snap.docs[0].data()

if(data.password!==pass){
errorDiv.innerText="Şifre yanlış"
return
}

currentUser=user
currentAvatar=data.avatar||""

loginDiv.style.display="none"
chatDiv.style.display="flex"

await setDoc(doc(db,"online",user),{
username:user,
avatar:currentAvatar
})

loadMessages()
loadOnline()

}

window.sendMessage=async function(){

let text=messageInput.value.trim()
if(!text)return

await addDoc(collection(db,"messages"),{
user:currentUser,
text:text,
avatar:currentAvatar
})

messageInput.value=""
}

messageInput.addEventListener("keypress",e=>{
if(e.key==="Enter")sendMessage()
})

function loadMessages(){

onSnapshot(collection(db,"messages"),snap=>{

messages.innerHTML=""

if(snap.size>lastCount){

newMsgAlert.style.display="block"

setTimeout(()=>{
newMsgAlert.style.display="none"
},1500)

}

lastCount=snap.size

snap.forEach(d=>{

let data=d.data()

let div=document.createElement("div")
div.className="message"

let avatarHTML=data.avatar?
`<img class="avatar" src="${data.avatar}">`:""

let controls=""

if(data.user===currentUser){
controls=`<span class="edit">✏</span><span class="delete">❌</span>`
}

div.innerHTML=
`${avatarHTML}<b>${data.user}</b>: ${data.text} ${controls}`

if(data.user===currentUser){

div.querySelector(".delete").onclick=()=>{
deleteDoc(doc(db,"messages",d.id))
}

div.querySelector(".edit").onclick=async()=>{

let newText=prompt("Mesajı düzenle",data.text)

if(newText){
await updateDoc(doc(db,"messages",d.id),{text:newText})
}

}

}

messages.appendChild(div)

})

messages.scrollTop=messages.scrollHeight

})

}

function loadOnline(){

onSnapshot(collection(db,"online"),snap=>{

onlineUsers.innerHTML=""

snap.forEach(d=>{

let data=d.data()

let div=document.createElement("div")
div.className="user"

div.innerHTML=
`${data.avatar?`<img class="avatar" src="${data.avatar}">`:""} ${data.username}`

onlineUsers.appendChild(div)

})

})

}

function fileToBase64(file){

return new Promise((res,rej)=>{

let reader=new FileReader()

reader.onload=()=>res(reader.result)
reader.onerror=err=>rej(err)

reader.readAsDataURL(file)

})

}

</script>

</body>
</html>
