<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Zoro Chat</title>

<style>

body{
margin:0;
font-family:Arial;
background:#2b2d31;
color:white;
}

#login{
display:flex;
flex-direction:column;
width:260px;
margin:120px auto;
gap:10px;
}

input,button{
padding:10px;
border-radius:6px;
border:none;
}

button{
background:#5865f2;
color:white;
cursor:pointer;
}

#error{
color:red;
font-size:14px;
}

#chat{
display:none;
height:100vh;
}

#sidebar{
width:200px;
background:#1e1f22;
padding:10px;
}

#onlineUsers{
font-size:14px;
}

#main{
flex:1;
display:flex;
flex-direction:column;
}

#messages{
flex:1;
overflow:auto;
padding:10px;
}

.message{
background:#383a40;
padding:8px;
margin:5px;
border-radius:5px;
position:relative;
}

.message:hover .delete{
display:block;
}

.delete{
position:absolute;
right:5px;
top:5px;
cursor:pointer;
display:none;
}

#sendBox{
display:flex;
gap:5px;
padding:10px;
background:#1e1f22;
}

#messageInput{
flex:1;
}

</style>

</head>
<body>

<div id="login">

<h2>Zoro Chat</h2>

<input id="username" placeholder="kullanıcı adı">
<input id="password" type="password" placeholder="şifre">

<div id="error"></div>

<button onclick="register()">Kayıt Ol</button>
<button onclick="login()">Giriş Yap</button>

</div>

<div id="chat">

<div id="sidebar">

<h3>Online</h3>
<div id="onlineUsers"></div>

</div>

<div id="main">

<div id="messages"></div>

<div id="sendBox">

<input id="messageInput" placeholder="mesaj yaz">

<button onclick="sendMessage()">Gönder</button>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
query,
where,
onSnapshot,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";


const firebaseConfig = {
apiKey: "AIzaSyD5KePIcdesXC8UQGBbqNGU7djehgXiZ6w",
authDomain: "zoro-69e06.firebaseapp.com",
projectId: "zoro-69e06",
storageBucket: "zoro-69e06.firebasestorage.app",
messagingSenderId: "184713014140",
appId: "1:184713014140:web:0b414e4accc0fc09aa12f9"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore();

const loginDiv = document.getElementById("login")
const chatDiv = document.getElementById("chat")
const errorDiv = document.getElementById("error")

let currentUser = null


window.register = async function(){

let user = username.value.trim()
let pass = password.value.trim()

errorDiv.innerText=""

if(!user){
errorDiv.innerText="Kullanıcı adı boş bırakılamaz"
return
}

if(!pass){
errorDiv.innerText="Şifre boş bırakılamaz"
return
}

const q = query(
collection(db,"users"),
where("username","==",user)
)

const snapshot = await getDocs(q)

if(!snapshot.empty){

errorDiv.innerText="Bu kullanıcı adı zaten kullanılıyor"
return

}

await addDoc(collection(db,"users"),{
username:user,
password:pass
})

errorDiv.innerText="Kayıt başarılı"

}


window.login = async function(){

let user = username.value.trim()
let pass = password.value.trim()

errorDiv.innerText=""

const q = query(
collection(db,"users"),
where("username","==",user)
)

const snapshot = await getDocs(q)

if(snapshot.empty){

errorDiv.innerText="Kullanıcı bulunamadı"
return

}

let data = snapshot.docs[0].data()

if(data.password !== pass){

errorDiv.innerText="Şifre yanlış"
return

}

currentUser = user

loginDiv.style.display="none"
chatDiv.style.display="flex"

loadMessages()

}



async function sendMessage(){

let text = messageInput.value.trim()

if(!text) return

await addDoc(collection(db,"messages"),{

user:currentUser,
text:text

})

messageInput.value=""

}



function loadMessages(){

onSnapshot(collection(db,"messages"),snapshot=>{

messages.innerHTML=""

snapshot.forEach(docu=>{

let data = docu.data()

let div = document.createElement("div")
div.className="message"

div.innerHTML =
"<b>"+data.user+"</b>: "+data.text+
'<span class="delete">❌</span>'

div.querySelector(".delete").onclick=()=>{

deleteDoc(doc(db,"messages",docu.id))

}

messages.appendChild(div)

})

})

}

</script>

</body>
</html>
