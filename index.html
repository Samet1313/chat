<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Chat</title>

<style>

body{
font-family:Arial;
background:#1e1e1e;
color:white;
margin:0;
}

#login{
display:flex;
flex-direction:column;
width:250px;
margin:120px auto;
gap:10px;
}

input,button{
padding:10px;
border:none;
border-radius:5px;
}

button{
background:#5865f2;
color:white;
cursor:pointer;
}

#chat{
display:none;
height:100vh;
flex-direction:column;
}

#messages{
flex:1;
overflow:auto;
padding:10px;
}

.message{
background:#2e2e2e;
padding:8px;
margin:5px;
border-radius:5px;
position:relative;
}

.delete{
position:absolute;
right:5px;
top:5px;
cursor:pointer;
display:none;
color:red;
}

.message:hover .delete{
display:block;
}

#sendBox{
display:flex;
gap:5px;
padding:10px;
background:#111;
}

#messageInput{
flex:1;
}

</style>

</head>
<body>

<div id="login">

<h2>Kayıt / Giriş</h2>

<input id="username" placeholder="kullanıcı adı">
<input id="password" type="password" placeholder="şifre">

<button onclick="register()">Kayıt Ol</button>
<button onclick="login()">Giriş Yap</button>

</div>

<div id="chat">

<div id="messages"></div>

<div id="sendBox">

<input id="messageInput" placeholder="mesaj yaz">

<button onclick="sendMessage()">Gönder</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
query,
where,
onSnapshot,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";


const firebaseConfig = {
apiKey: "AIzaSyD5KePIcdesXC8UQGBbqNGU7djehgXiZ6w",
authDomain: "zoro-69e06.firebaseapp.com",
projectId: "zoro-69e06",
storageBucket: "zoro-69e06.firebasestorage.app",
messagingSenderId: "184713014140",
appId: "1:184713014140:web:0b414e4accc0fc09aa12f9",
measurementId: "G-N5CJ37CFPC"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore();

let currentUser = null;



window.register = async function(){

let user = username.value
let pass = password.value

if(!user || !pass){
alert("boş bırakma")
return
}

await addDoc(collection(db,"users"),{
username:user,
password:pass
})

alert("kayıt başarılı")

}



window.login = async function(){

let user = username.value
let pass = password.value

const q = query(
collection(db,"users"),
where("username","==",user),
where("password","==",pass)
)

const querySnapshot = await getDocs(q)

if(querySnapshot.empty){

alert("kullanıcı bulunamadı")
return

}

currentUser = user

login.style.display="none"
chat.style.display="flex"

loadMessages()

}



async function sendMessage(){

let text = messageInput.value

if(!text) return

await addDoc(collection(db,"messages"),{

user:currentUser,
text:text

})

messageInput.value=""

}



function loadMessages(){

onSnapshot(collection(db,"messages"),snapshot=>{

messages.innerHTML=""

snapshot.forEach(docu=>{

let data = docu.data()

let div = document.createElement("div")
div.className="message"

div.innerHTML =
"<b>"+data.user+"</b>: "+data.text+
'<span class="delete">❌</span>'

div.querySelector(".delete").onclick=()=>{

deleteDoc(doc(db,"messages",docu.id))

}

messages.appendChild(div)

})

})

}

</script>

</body>
</html>
