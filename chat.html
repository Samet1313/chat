<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Arkadaş Chat</title>

<style>

body{
font-family:Arial;
background:#1e1e1e;
color:white;
margin:0;
}

#login{
display:flex;
flex-direction:column;
width:250px;
margin:120px auto;
gap:10px;
}

input,button{
padding:10px;
border:none;
border-radius:5px;
}

button{
background:#5865f2;
color:white;
cursor:pointer;
}

#chat{
display:none;
height:100vh;
flex-direction:column;
}

#messages{
flex:1;
overflow:auto;
padding:10px;
}

.message{
background:#2e2e2e;
padding:8px;
margin:5px;
border-radius:5px;
position:relative;
max-width:500px;
}

.delete{
position:absolute;
right:5px;
top:5px;
cursor:pointer;
display:none;
color:red;
}

.message:hover .delete{
display:block;
}

#sendBox{
display:flex;
gap:5px;
padding:10px;
background:#111;
}

#messageInput{
flex:1;
}

#dropZone{
border:2px dashed #555;
padding:10px;
text-align:center;
margin:5px;
}

</style>
</head>

<body>

<div id="login">

<h2>Giriş / Kayıt</h2>

<input id="email" placeholder="email">
<input id="password" type="password" placeholder="şifre">

<button onclick="register()">Kayıt Ol</button>
<button onclick="login()">Giriş Yap</button>

</div>

<div id="chat">

<div id="dropZone">Dosyayı buraya sürükle</div>

<div id="messages"></div>

<div id="sendBox">

<input id="messageInput" placeholder="mesaj yaz">

<input type="file" id="fileInput">

<button onclick="sendMessage()">Gönder</button>

</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import {
getStorage,
ref,
uploadBytes,
getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";


const firebaseConfig = {
apiKey: "AIzaSyD5KePIcdesXC8UQGBbqNGU7djehgXiZ6w",
authDomain: "zoro-69e06.firebaseapp.com",
projectId: "zoro-69e06",
storageBucket: "zoro-69e06.firebasestorage.app",
messagingSenderId: "184713014140",
appId: "1:184713014140:web:0b414e4accc0fc09aa12f9",
measurementId: "G-N5CJ37CFPC"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth();
const db = getFirestore();
const storage = getStorage();


window.register = function(){

createUserWithEmailAndPassword(
auth,
email.value,
password.value
).catch(e=>alert(e.message))

}

window.login = function(){

signInWithEmailAndPassword(
auth,
email.value,
password.value
).catch(e=>alert(e.message))

}

onAuthStateChanged(auth,user=>{

if(user){

login.style.display="none";
chat.style.display="flex";

loadMessages()

}

})


async function sendMessage(file=null){

let text = messageInput.value

let selectedFile = file || fileInput.files[0]

let fileUrl = ""

if(selectedFile){

let fileRef = ref(storage,"files/"+Date.now()+selectedFile.name)

await uploadBytes(fileRef,selectedFile)

fileUrl = await getDownloadURL(fileRef)

}

await addDoc(
collection(db,"messages"),
{
text:text,
file:fileUrl
}
)

messageInput.value=""
fileInput.value=""

}


function loadMessages(){

onSnapshot(
collection(db,"messages"),
snapshot=>{

messages.innerHTML=""

snapshot.forEach(docu=>{

let data = docu.data()

let div = document.createElement("div")
div.className="message"

let html = data.text || ""

if(data.file){

if(data.file.match(/\.(jpg|jpeg|png|gif|webp)/)){

html += `<br><img src="${data.file}" width="200">`

}else{

html += `<br><a href="${data.file}" target="_blank">Dosya indir</a>`

}

}

div.innerHTML = html + `<span class="delete">❌</span>`

div.querySelector(".delete").onclick=()=>{

deleteDoc(doc(db,"messages",docu.id))

}

messages.appendChild(div)

})

})

}


dropZone.addEventListener("dragover",e=>{
e.preventDefault()
})

dropZone.addEventListener("drop",e=>{
e.preventDefault()

let file = e.dataTransfer.files[0]

sendMessage(file)

})

</script>

</body>
</html>
